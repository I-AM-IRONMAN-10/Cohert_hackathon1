<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Key Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>API Key Manager</h1>

    <div class="form-group">
      <label for="title">Key Title</label>
      <input id="title" type="text" placeholder="e.g. Stripe API Key">
    </div>

    <div class="form-group">
      <label for="secret">Secret</label>
      <input id="secret" type="password" placeholder="Paste your secret here">
    </div>

    <button id="createBtn" onclick="create()">+ Add Key</button>

    <div id="status"></div>

    <h2>Stored Keys</h2>
    <div id="list"></div>
  </div>

  <script src="app.js"></script>

</body>
</html>
